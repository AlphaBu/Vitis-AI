report_level=2

[vivado]

[advanced]

[connectivity]
  nk=image_processing:1
  sp=image_processing_1.m_axi_mm_video:LPDDR
  # Place pass_through input (gmem0) and output (gmem1) in DIFFERENT LPDDR banks
  # so the DATAFLOW read (gmem0) and write (gmem1) streams use separate NoC
  # channels and can run in parallel. Without these, cfgen maps both to the
  # aggregate LPDDR (same bank) -> group_id(0)==group_id(1) in the host.
  sp=pass_through_1.in:LPDDR01
  sp=pass_through_1.out:LPDDR23

[clock]
  freqHz=300000000:image_processing_1
  freqHz=312500000:pass_through_1

